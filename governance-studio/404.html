<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Governance Studio</title>
  <script>
    // Redirigir a index.html conservando la ruta solicitada
    var segmentCount = 2; // /Agentic-knowledge/governance-studio = 2
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
